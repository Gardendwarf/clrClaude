server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # -- Supabase API proxy --
    # Routes /supabase/* to Kong on the Docker network.
    # Bypasses Cloudflare entirely -- apikey header passes through clean.
    # The browser talks to clrclaude.clrtech.xyz/supabase/auth/v1/...
    # and Nginx forwards to supabase-kong:8000/auth/v1/...

    location /supabase/ {
        # Strip the /supabase prefix before forwarding
        rewrite ^/supabase/(.*) /$1 break;

        proxy_pass http://supabase-kong:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass all headers through -- especially apikey and Authorization
        proxy_pass_request_headers on;

        # WebSocket support (for Supabase realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Hashed assets -- cache forever (Vite adds content hashes)
    location /assets/ {
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # Markdown content -- cache for 1 day
    location /content/ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # SPA fallback -- everything else goes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
