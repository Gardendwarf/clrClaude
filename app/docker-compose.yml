# clrClaude -- Dokploy/Traefik deployment
# Frontend served via Nginx, Supabase API proxied through /supabase/ path.
# This avoids Cloudflare stripping the apikey header.

services:
  clrclaude:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clrclaude
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      # Supabase URL points to ourselves -- Nginx proxies /supabase/* to Kong
      - VITE_SUPABASE_URL=https://clrclaude.clrtech.xyz/supabase
    networks:
      - proxy
      - supabase_supabase
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.clrclaude.rule=Host(`clrclaude.clrtech.xyz`)"
      - "traefik.http.routers.clrclaude.entrypoints=websecure"
      - "traefik.http.routers.clrclaude.tls=true"
      - "traefik.http.routers.clrclaude.tls.certresolver=letsencrypt"
      - "traefik.http.services.clrclaude.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
  supabase_supabase:
    external: true
